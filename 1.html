<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu do Curso</title>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .welcome-text {
            color: #666;
            font-size: 14px;
            font-weight: bold;
        }

        .menu-grid {
            width: 100%;
            max-width: 400px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .menu-item {
            background-color: #fff;
            padding: 22px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .menu-item:active {
            transform: scale(0.97);
        }

        .menu-item h2 {
            margin: 0;
            font-size: 17px;
            color: white; /* O texto ficará sobre o fundo colorido */
        }

        /* Cores Intercaladas */
        .rosa { background-color: #d63384; }
        .azul { background-color: #3498db; }
        
        /* Estilo para o item de Dinâmica (Destaque) */
        .dinamica-item {
            background-color: #2c3e50; /* Um tom escuro elegante para diferenciar */
            margin-top: 10px;
        }

        .icon-arrow {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
        }
    </style>
</head>
<body>

    <header>
        <h1 id="boasVindas">Bem-vindos</h1>
        <p class="welcome-text">Selecione o módulo de hoje</p>
    </header>

    <div class="menu-grid">
        <a href="2.html" class="menu-item rosa">
            <h2>1. Comunicação e Escuta</h2>
            <span class="icon-arrow">→</span>
        </a>

        <a href="3.html" class="menu-item azul">
            <h2>2. Linguagens do Amor</h2>
            <span class="icon-arrow">→</span>
        </a>

        <a href="4.html" class="menu-item rosa">
            <h2>3. Gestão de Conflitos</h2>
            <span class="icon-arrow">→</span>
        </a>

        <a href="5.html" class="menu-item azul">
            <h2>4. Finanças e Unidade</h2>
            <span class="icon-arrow">→</span>
        </a>

        <a href="6.html" class="menu-item rosa">
            <h2>5. Intimidade e Romance</h2>
            <span class="icon-arrow">→</span>
        </a>

        <a href="7.html" class="menu-item azul">
            <h2>6. Propósito e Família</h2>
            <span class="icon-arrow">→</span>
        </a>

        <a href="8.html" class="menu-item dinamica-item">
            <h2 style="color: #f1c40f;">✨ Dinâmica e Lazer</h2>
            <span class="icon-arrow">→</span>
        </a>
    </div>

    <script>
        const casal = localStorage.getItem('casal');
        if (casal) {
            document.getElementById('boasVindas').innerText = "Olá, " + casal;
        }
    </script>
</body>
</html>
